# Build cl-protobufs OCI package with native overlays (protoc toolchain + pre-generated .lisp).
#
# darwin/arm64 only for now. Linux overlays will be added once this flow is proven.
name: Publish OCI Package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}/cl-systems

jobs:
  # ── Build native artifacts on darwin/arm64 ─────────────────────────
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (macOS)
        if: matrix.os == 'darwin'
        run: |
          brew install grpc cmake pkg-config
          echo "protobuf=$(brew info protobuf --json | python3 -c 'import json,sys; print(json.load(sys.stdin)["formulae"][0]["versions"]["stable"])')" >> "$GITHUB_OUTPUT"
        id: deps

      - name: Build protoc-gen-cl-pb
        run: |
          cd protoc
          cmake . -DCMAKE_CXX_STANDARD=17
          cmake --build . --parallel "$(sysctl -n hw.ncpu)"

      - name: Pre-generate well-known-types .lisp files
        run: |
          mkdir -p generated
          PROTOS="descriptor any source_context type api duration empty field_mask timestamp wrappers struct"
          # Use --proto_path=google/protobuf/ with bare filenames to match
          # ASDF's proto-to-lisp invocation (bare add-file-descriptor names)
          for proto in $PROTOS; do
            protoc --proto_path=google/protobuf/ \
              --plugin=protoc-gen-cl-pb=protoc/protoc-gen-cl-pb \
              --cl-pb_out="output-file=${proto}.lisp:generated/" \
              "${proto}.proto" \
              --experimental_allow_proto3_optional
          done
          echo "Generated files:"
          ls -la generated/

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/lib artifacts/generated
          cp "$(brew --prefix)/bin/protoc" artifacts/lib/protoc
          cp protoc/protoc-gen-cl-pb artifacts/lib/protoc-gen-cl-pb
          cp generated/*.lisp artifacts/generated/
          chmod +x artifacts/lib/protoc artifacts/lib/protoc-gen-cl-pb

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}-${{ matrix.arch }}
          path: artifacts/

  # ── Collect artifacts and publish OCI package ──────────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts/

      - name: Arrange overlay directories
        run: |
          for dir in native-artifacts/native-*; do
            slug=$(basename "$dir" | sed 's/^native-//')
            os=$(echo "$slug" | cut -d- -f1)
            arch=$(echo "$slug" | cut -d- -f2)
            mkdir -p "lib/${os}-${arch}" "generated/${os}-${arch}"
            cp "$dir"/lib/* "lib/${os}-${arch}/"
            cp "$dir"/generated/* "generated/${os}-${arch}/"
            chmod +x "lib/${os}-${arch}/"*
          done
          echo "==> lib/"
          find lib/ -type f
          echo "==> generated/"
          find generated/ -type f

      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl

      - name: Install Quicklisp
        run: |
          curl -o /tmp/quicklisp.lisp https://beta.quicklisp.org/quicklisp.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/quicklisp.lisp \
            --eval '(quicklisp-quickstart:install :path #p"~/quicklisp/")'
          sbcl --noinform --non-interactive \
            --load ~/quicklisp/setup.lisp \
            --eval '(ql-util:without-prompting (ql:add-to-init-file))'

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Pull cl-repository-packager from GHCR
        run: |
          CL_REPO_TAG="0.8.0"
          CL_REPO_IMAGE="ghcr.io/egao1980/cl-repository/cl-repository-packager"
          rm -rf /tmp/cl-repo-pull
          mkdir -p /tmp/cl-repo-pull ~/.local/share/cl-systems
          rm -rf ~/.local/share/cl-systems/cl-oci-*
          oras pull "${CL_REPO_IMAGE}:${CL_REPO_TAG}" -o /tmp/cl-repo-pull/
          for f in /tmp/cl-repo-pull/*.tar.gz; do
            tar -xzf "$f" -C ~/.local/share/cl-systems/
          done
          echo "Extracted cl-repository-packager:"
          ls -la ~/.local/share/cl-systems/

      - name: Build and publish OCI package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAMESPACE=$(echo "${{ env.NAMESPACE }}" | tr '[:upper:]' '[:lower:]')

          cat > /tmp/publish.lisp <<'LISP'
          (require :asdf)

          (asdf:initialize-source-registry
            '(:source-registry
              (:tree (:home ".local/share/cl-systems/"))
              :inherit-configuration))

          (load (merge-pathnames "quicklisp/setup.lisp" (user-homedir-pathname)))
          (ql:quickload :cl-repository-packager)

          (let* ((version (uiop:getenv "PKG_VERSION"))
                 (auth (cl-oci-client/auth:make-auth-config
                         :username (uiop:getenv "GITHUB_ACTOR")
                         :password (uiop:getenv "GITHUB_TOKEN")))
                 (reg (cl-oci-client/registry:make-registry
                        (format nil "https://~a" (uiop:getenv "OCI_REGISTRY"))
                        :auth auth))
                 (spec (make-instance 'cl-repository-packager/build-matrix:package-spec
                         :name "cl-protobufs"
                         :version version
                         :source-dir (uiop:getcwd)
                         :license "MIT"
                         :description "Protocol Buffers for Common Lisp"
                         :depends-on '("closer-mop" "alexandria" "trivial-garbage"
                                       "cl-base64" "local-time" "float-features")
                         :provides '("cl-protobufs" "cl-protobufs.asdf")
                         :overlays (list
                           (make-instance 'cl-repository-packager/build-matrix:overlay-spec
                             :os "darwin" :arch "arm64"
                             :layers (list
                                      (list :role "native-library"
                                            :files '(("lib/darwin-arm64/protoc" . "protoc")
                                                     ("lib/darwin-arm64/protoc-gen-cl-pb"
                                                      . "protoc-gen-cl-pb")))
                                      (list :role "generated-source"
                                            :files '(("generated/darwin-arm64/descriptor.lisp"
                                                      . "descriptor.lisp")
                                                     ("generated/darwin-arm64/any.lisp"
                                                      . "any.lisp")
                                                     ("generated/darwin-arm64/source_context.lisp"
                                                      . "source_context.lisp")
                                                     ("generated/darwin-arm64/type.lisp"
                                                      . "type.lisp")
                                                     ("generated/darwin-arm64/api.lisp"
                                                      . "api.lisp")
                                                     ("generated/darwin-arm64/duration.lisp"
                                                      . "duration.lisp")
                                                     ("generated/darwin-arm64/empty.lisp"
                                                      . "empty.lisp")
                                                     ("generated/darwin-arm64/field_mask.lisp"
                                                      . "field_mask.lisp")
                                                     ("generated/darwin-arm64/timestamp.lisp"
                                                      . "timestamp.lisp")
                                                     ("generated/darwin-arm64/wrappers.lisp"
                                                      . "wrappers.lisp")
                                                     ("generated/darwin-arm64/struct.lisp"
                                                      . "struct.lisp"))))))))
                 (result (cl-repository-packager/build-matrix:build-package spec)))
            (cl-repository-packager/publisher:publish-package
              reg (uiop:getenv "OCI_NAMESPACE") version result spec))
          LISP

          PKG_VERSION="$VERSION" \
          GITHUB_ACTOR="${{ github.actor }}" \
          OCI_REGISTRY="${{ env.REGISTRY }}" \
          OCI_NAMESPACE="$NAMESPACE" \
          sbcl --noinform --non-interactive --load /tmp/publish.lisp

      - name: Verify published artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAMESPACE=$(echo "${{ env.NAMESPACE }}" | tr '[:upper:]' '[:lower:]')
          oras manifest fetch "${REGISTRY}/${NAMESPACE}/cl-protobufs:${VERSION}" \
            --registry-config <(echo "{\"auths\":{\"ghcr.io\":{\"username\":\"${{ github.actor }}\",\"password\":\"${GITHUB_TOKEN}\"}}}")
